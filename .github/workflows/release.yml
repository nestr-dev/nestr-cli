name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  verify-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Check version match
        run: |
          TAG_VERSION=${RELEASE_TAG#v}
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Tag is v$TAG_VERSION but Cargo.toml has $CARGO_VERSION"
            echo "Please update Cargo.toml version to $TAG_VERSION before tagging."
            exit 1
          fi
          echo "Version match confirmed."

  # build runs only after verify-version; advisories are gated on PRs to main by
  # lint.yml's `audit` job (see .github/workflows/lint.yml).
  build:
    name: Build (${{ matrix.target }})
    needs: verify-version
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: "1.94.1"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "../../../nestr-${RELEASE_TAG#v}-${{ matrix.target }}.tar.gz" nestr
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          Compress-Archive -Path "target/${{ matrix.target }}/release/nestr.exe" -DestinationPath "nestr-$version-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nestr-${{ matrix.target }}
          path: nestr-*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}
        # required for the anchore/sbom-action workspace scan below

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: artifacts/nestr-sbom.cyclonedx.json

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nestr-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksums
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cosign sign-blob --yes \
            --bundle artifacts/checksums-sha256.txt.sigstore.json \
            artifacts/checksums-sha256.txt

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: artifacts/*

  # Regenerate the Homebrew formula in nestr-dev/homebrew-tap from the published
  # checksums and push it. No-op (with a warning) until the HOMEBREW_TAP_TOKEN secret
  # — a PAT with contents:write on the tap repo — is configured.
  homebrew:
    name: Update Homebrew tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Render formula and push to the tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN not set — skipping Homebrew tap update."
            exit 0
          fi
          version="${TAG#v}"
          base="https://github.com/nestr-dev/nestr-cli/releases/download/${TAG}"
          curl -fsSL "${base}/checksums-sha256.txt" -o checksums.txt
          sha() { awk -v f="nestr-${version}-$1" '$2 == f { print $1 }' checksums.txt; }
          mac_arm="$(sha aarch64-apple-darwin.tar.gz)"
          mac_x86="$(sha x86_64-apple-darwin.tar.gz)"
          lnx_arm="$(sha aarch64-unknown-linux-musl.tar.gz)"
          lnx_x86="$(sha x86_64-unknown-linux-musl.tar.gz)"
          for v in "${mac_arm}" "${mac_x86}" "${lnx_arm}" "${lnx_x86}"; do
            if [ -z "${v}" ]; then
              echo "::error::missing checksum in checksums-sha256.txt"
              exit 1
            fi
          done
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/nestr-dev/homebrew-tap.git" tap
          sed -e "s/@@VERSION@@/${version}/g" \
              -e "s/@@MAC_ARM@@/${mac_arm}/g" \
              -e "s/@@MAC_X86@@/${mac_x86}/g" \
              -e "s/@@LNX_ARM@@/${lnx_arm}/g" \
              -e "s/@@LNX_X86@@/${lnx_x86}/g" \
              .github/homebrew/nestr-cli.rb.tmpl > tap/Formula/nestr-cli.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/nestr-cli.rb
          if git diff --cached --quiet; then
            echo "Formula already current — nothing to push."
          else
            git commit -m "nestr-cli ${version}"
            git push
          fi
